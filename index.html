<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nookly | Software Solutions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-nookly-navy { background-color: #0A1D37; }
        .text-nookly-teal { color: #14B8A6; }
        .bg-nookly-teal { background-color: #14B8A6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="py-6 px-8 max-w-7xl mx-auto flex justify-end space-x-8 text-sm font-bold uppercase tracking-widest text-slate-400">
        <a href="#" class="hover:text-nookly-navy transition">Features</a>
        <a href="#" class="hover:text-nookly-navy transition">Pricing</a>
        <a href="#" class="hover:text-nookly-navy transition">Support</a>
    </nav>

    <section class="pt-10 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto">
            <div class="flex flex-col items-center mb-12">
                <img src="assets/logo.png" alt="Nookly Logo" class="w-48 md:w-64 h-auto mb-6">
                <h1 class="text-6xl md:text-8xl font-extrabold tracking-tighter text-nookly-navy">
                    Nookly
                </h1>
            </div>

            <p class="text-xl md:text-2xl text-slate-500 font-medium mb-10 max-w-2xl mx-auto leading-relaxed">
                Book Smarter, Grow Faster. <br>
                Build your customized website, manage unlimited team members, and eliminate no-shows.
            </p>

            <div class="flex justify-center mb-20">
                <button class="bg-nookly-teal text-white px-12 py-4 rounded-full text-lg font-bold shadow-xl hover:bg-teal-600 hover:-translate-y-1 transition-all duration-300">
                    DEMO
                </button>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl p-8 border border-slate-100 max-w-3xl mx-auto overflow-hidden">
                <div class="flex justify-between items-center mb-8">
                    <span class="font-bold text-xl text-nookly-navy">January 2026</span>
                    <div class="bg-slate-100 px-4 py-2 rounded-lg text-sm font-bold">Today</div>
                </div>
                <div class="grid grid-cols-7 gap-4">
                    <div class="h-32 bg-slate-50 rounded-xl border border-dashed border-slate-200"></div>
                    <div class="h-32 bg-teal-50 rounded-xl border-2 border-nookly-teal flex flex-col items-center justify-center p-2">
                        <span class="text-nookly-teal text-[10px] font-extrabold uppercase mb-1">Booking</span>
                        <div class="w-full h-1 bg-nookly-teal rounded"></div>
                    </div>
                    <div class="h-32 bg-slate-50 rounded-xl border border-dashed border-slate-200 col-span-5"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-slate-200 bg-white">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <div class="text-center md:text-left">
                <p class="font-bold text-nookly-navy">Nookly Software Inc.</p>
                <p class="text-xs text-slate-400">Enterprise SaaS for Wellness & Beauty Professionals</p>
            </div>
            <div class="flex space-x-6 text-xs font-bold text-slate-400 uppercase tracking-widest">
                <a href="mailto:hello@nookly.ca" class="hover:text-nookly-teal transition">hello@nookly.ca</a>
            </div>
        </div>
    </footer>

</body>
</html>
